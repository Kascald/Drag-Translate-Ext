<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-color: #1e1e1e;       
      --item-bg: #2d2d2d;        
      --item-hover: #3d3d3d;     
      --text-main: #e0e0e0;    
      --text-sub: #a0a0a0;      
      --accent: #4CAF50;       
      --border: #333333;        
    }

    body { 
      width: 200px; 
      margin: 0;
      padding: 8px 0; 
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      font-size: 14px;
    }

    .menu-item { 
      padding: 12px 16px; 
      cursor: pointer; 
      transition: background 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .menu-item:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }

    .menu-item:hover { 
      background-color: var(--item-hover); 
    }

    /* 토글 스위치 스타일 */
    .switch {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 20px;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #555;
      transition: .4s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px; width: 14px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(14px); }

    #openOptions {
      color: var(--text-sub);
      font-size: 12px;
      justify-content: center;
      margin-top: 4px;
    }

    #openOptions:hover {
      color: var(--text-main);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="menu-item">
    <span>기능 활성화</span>
    <label class="switch">
      <input type="checkbox" id="mainToggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="menu-item" id="disableSite">
    <span>현재 사이트 제외</span>
  </div>
  <div class="menu-item" id="openOptions">
    설정 및 리스트 관리
  </div>
  <script src="popup.js"></script>
</body>
</html>
