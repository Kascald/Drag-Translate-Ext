<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Translate_ext 설정</title>
    <style>
      body {
        background-color: #1e1e1e;
        color: #e0e0e0;
        font-family: sans-serif;
        padding: 20px;
      }

      .section {
        margin-bottom: 30px;
        padding: 20px;
        background: #252525;
        border-radius: 8px;
        border: 1px solid #333;
      }

      #domainList {
        list-style: none;
        padding: 0;
        margin-top: 15px;
      }

      #domainList li {
        background: #2d2d2d;
        margin-bottom: 8px;
        padding: 10px 15px;
        border-radius: 6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid #383838;
      }

      #domainList li button {
        background-color: #cf6679;
        color: #000;
        border: none;
        padding: 5px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.2s;
      }

      #domainList li button:hover {
        background-color: #ffb4ab;
      }

      input,
      select,
      button#saveBtn {
        background: #333;
        color: #fff;
        border: 1px solid #444;
        padding: 8px;
        border-radius: 4px;
      }

      button#saveBtn {
        background-color: #03dac6;
        color: #000;
        cursor: pointer;
        font-weight: bold;
      }

      .footer {
        margin-top: 50px;
        padding-top: 20px;
        border-top: 1px solid #333;
        text-align: center;
        font-size: 13px;
        color: #a0a0a0;
      }

      .footer a {
        color: #03dac6;
        text-decoration: none;
        font-weight: bold;
      }

      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h2>DeepL API 설정</h2>
    <label for="apiKey">API Key:</label>
    <input
      type="password"
      id="apiKey"
      placeholder="DeepL API 키를 입력하세요"
      size="40"
    />
    <button id="saveBtn">저장</button>
    <span id="status"></span>

    <script type="module" src="./options.js"></script>

    <div>
      <label>번역 대상 언어 (Target):</label>
      <select id="targetLang">
        <option value="KO">한국어</option>
        <option value="EN-US">영어</option>
        <option value="JA">일본어</option>
      </select>
    </div>
    <div>
      <label>모국어 제외 (번역 안 함):</label>
      <input type="checkbox" id="skipNative" />
      <span style="font-size: 12px; color: #666"
        >(한글이 포함된 드래그는 API를 호출하지 않습니다)</span
      >
    </div>

    <div class="section">
      <h3>번역 제외 사이트 관리</h3>
      <ul id="domainList" style="list-style: none; padding: 0"></ul>
    </div>

    <div class="footer">
      <p>
        개발자: Kascald |
        <a href="https://github.com/네아이디/Drag-Translate_Ext" target="_blank"
          >GitHub Repository</a
        >
      </p>
      <p style="font-size: 11px; color: #666">v0.2.0 - Powered by DeepL API</p>
    </div>
  </body>
</html>
